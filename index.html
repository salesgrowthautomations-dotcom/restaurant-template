<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquatechniques | Select Your Guppies</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0a0f1c;color:white;}
header{padding:40px 20px;text-align:center;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.7)),url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1600&q=80');background-size:cover;background-position:center;}
header h1{font-size:40px;margin-bottom:10px;}
header p{font-size:18px;color:#ccc;}
section{padding:40px 20px;text-align:center;}
h2{font-size:28px;margin-bottom:20px;color:#00e0ff;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;margin-bottom:40px;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-radius:15px;padding:15px;display:flex;flex-direction:column;justify-content:space-between;transition:.3s;}
.card img{border-radius:12px;margin-bottom:8px;transition:.3s;}
.card img:hover{transform:scale(1.05);}
.card button{padding:8px;background:#00e0ff;border:none;color:black;font-weight:600;border-radius:20px;cursor:pointer;transition:.3s;}
.card button:hover{background:#00b3cc;}
#cart{background:#111827;padding:20px;border-radius:15px;max-width:500px;margin:0 auto 50px auto;text-align:left;}
#cart h3{margin-bottom:15px;}
#cart ul{list-style:none;margin-bottom:15px;}
#cart ul li{margin-bottom:5px;}
#checkout{padding:12px;background:#25D366;border:none;color:white;font-weight:600;border-radius:30px;cursor:pointer;width:100%;font-size:16px;transition:.3s;}
#checkout:hover{background:#1da851;}
</style>
</head>
<body>

<header>
<h1>Aquatechniques</h1>
<p>Select Your Favorite Guppies (100 Available)</p>
</header>

<section>
<h2>Our Guppies</h2>
<div class="cards" id="fish-cards">
  <!-- Example Fish 1 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1618842676088-c4d48a6b7c9d?auto=format&fit=crop&w=300&q=80" alt="Guppy 1">
    <p>Guppy 1</p>
    <button onclick="addToCart('Guppy 1',150)">Add to Cart</button>
  </div>
  <!-- Example Fish 2 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1581888227599-779811939961?auto=format&fit=crop&w=300&q=80" alt="Guppy 2">
    <p>Guppy 2</p>
    <button onclick="addToCart('Guppy 2',150)">Add to Cart</button>
  </div>
  <!-- Example Fish 3 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1599507593499-a3f7d7d97667?auto=format&fit=crop&w=300&q=80" alt="Guppy 3">
    <p>Guppy 3</p>
    <button onclick="addToCart('Guppy 3',150)">Add to Cart</button>
  </div>
  <!-- Repeat this block for all 100 guppies -->
</div>
</section>

<section>
<h2>Your Cart</h2>
<div id="cart">
<h3>Selected Fish</h3>
<ul id="cart-items"><li>Cart is empty</li></ul>
<p>Total: ₹<span id="total">0</span></p>
<button id="checkout" onclick="checkout()">Place Order via WhatsApp</button>
</div>
</section>

<script>
let cart = [];
function addToCart(name,price){
  let found = cart.find(item=>item.name===name);
  if(found){found.qty++;} else {cart.push({name:name,price:price,qty:1});}
  updateCart();
}
function updateCart(){
  let ul=document.getElementById('cart-items');
  ul.innerHTML='';
  let total=0;
  if(cart.length===0){ul.innerHTML='<li>Cart is empty</li>';}
  else{
    cart.forEach(item=>{
      ul.innerHTML+='<li>'+item.name+' x'+item.qty+' – ₹'+(item.price*item.qty)+'</li>';
      total+=item.price*item.qty;
    });
  }
  document.getElementById('total').innerText=total;
}
function checkout(){
  if(cart.length===0){alert('Cart is empty'); return;}
  let name=prompt('Enter your Name');
  let phone=prompt('Enter your WhatsApp number');
  if(!name || !phone){alert('Name and WhatsApp required'); return;}
  let message='Hello! I want to place an order.\nName: '+name+'\nWhatsApp: '+phone+'\nOrder Details:\n';
  cart.forEach(item=>{message+=item.name+' x'+item.qty+' – ₹'+(item.price*item.qty)+'\n';});
  let waNumber='916360513214'; // Your WhatsApp number
  let url='https://wa.me/'+waNumber+'?text='+encodeURIComponent(message);
  window.open(url,'_blank');
}
</script>

</body>
</html>
